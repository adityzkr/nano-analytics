<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SPA Demo — SDK</title>
    <style>
      body { font-family: sans-serif; max-width: 640px; margin: 60px auto; line-height: 1.6; }
      nav button { margin-right: 12px; padding: 8px 16px; cursor: pointer; }
      .cta { margin-top: 20px; padding: 10px 18px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>SPA tracked via the npm SDK</h1>
    <p>Client-side routing only — no page reloads. Every route change is tracked automatically.</p>
    <nav>
      <button data-route="/app/home">Home</button>
      <button data-route="/app/dashboard">Dashboard</button>
      <button data-route="/app/settings">Settings</button>
    </nav>
    <h2 id="route">/app/home</h2>
    <button class="cta" id="buy">Buy now (custom event)</button>

    <script type="module">
      // In a real app this is: import { init, track } from "nano-analytics";
      import { init, track } from "./nano-sdk.js";

      init({ siteId: "AJxVJ7hMY1Si", host: "http://localhost:4000" });

      document.querySelectorAll("nav button").forEach((b) =>
        b.addEventListener("click", () => {
          history.pushState({}, "", b.dataset.route); // SDK picks this up automatically
          document.getElementById("route").textContent = b.dataset.route;
        })
      );
      document.getElementById("buy").addEventListener("click", () => track("purchase"));
    </script>
  </body>
</html>
